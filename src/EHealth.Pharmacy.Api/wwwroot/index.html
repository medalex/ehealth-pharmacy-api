<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pharmacy System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f5f7fa;font-size:.92rem}
    .topbar{background:#495057;color:#fff;padding:.6rem 1.2rem;display:flex;align-items:center;gap:1rem}
    .topbar h1{font-size:1.1rem;margin:0;font-weight:600}
    .card-section{background:#fff;border-radius:8px;border:1px solid #dde3ea;margin-bottom:1.2rem;overflow:hidden}
    .cs-header{background:#f7f9fc;border-bottom:1px solid #dde3ea;padding:.55rem 1rem;font-weight:600;font-size:.85rem;color:#343a40}
    .cs-body{padding:1rem}
    table{font-size:.82rem}
    .mono{font-family:monospace;font-size:.75rem}
    label{font-size:.82rem;font-weight:500;margin-bottom:.2rem}
    .btn-primary{background:#495057;border-color:#495057}
    .btn-primary:hover{background:#343a40;border-color:#343a40}
    .status-Received{background:#fff3cd;color:#856404;padding:.15em .5em;border-radius:4px;font-size:.75rem;font-weight:600}
    .status-Verified{background:#d4edda;color:#155724;padding:.15em .5em;border-radius:4px;font-size:.75rem;font-weight:600}
    .status-Dispensed{background:#cce5ff;color:#004085;padding:.15em .5em;border-radius:4px;font-size:.75rem;font-weight:600}
    .status-Rejected{background:#f8d7da;color:#721c24;padding:.15em .5em;border-radius:4px;font-size:.75rem;font-weight:600}
    .zkp-pass{color:#155724;font-weight:600}
    .zkp-fail{color:#721c24;font-weight:600}
  </style>
</head>
<body>
<div class="topbar">
  <h1>💊 Pharmacy Dispensing System</h1>
  <span class="ms-auto small text-white-50">ZKP proof verified by cryptographic protocol</span>
</div>

<div class="container-fluid px-4 py-3" style="max-width:1100px">

  <!-- RECEIVE -->
  <div class="card-section">
    <div class="cs-header">Receive Prescription from Hospital</div>
    <div class="cs-body">
      <p class="text-muted small mb-2">Paste the prescription data received from the hospital system (or use the "→ Pharmacy" button in the hospital UI).</p>
      <div class="row g-2">
        <div class="col-md-2">
          <label>Drug ID</label>
          <select id="r-drug" class="form-select form-select-sm">
            <option value="101">101 Ibuprofen</option>
            <option value="102">102 Aspirin</option>
            <option value="103">103 Penicillin</option>
            <option value="104">104 Paracetamol</option>
          </select>
        </div>
        <div class="col-md-1">
          <label>Dosage</label>
          <input id="r-dosage" class="form-control form-control-sm" value="8 mg">
        </div>
        <div class="col-md-3">
          <label>Patient ID</label>
          <input id="r-pid" class="form-control form-control-sm" placeholder="UUID">
        </div>
        <div class="col-md-2">
          <label>ZKP Outcome</label>
          <select id="r-outcome" class="form-select form-select-sm">
            <option value="true">PASS</option>
            <option value="false">FAIL</option>
          </select>
        </div>
      </div>
      <div class="row g-2 mt-1">
        <div class="col-md-4">
          <label>stmtHash</label>
          <input id="r-stmt" class="form-control form-control-sm mono" placeholder="Poseidon hash">
        </div>
        <div class="col-md-4">
          <label>proofJson</label>
          <input id="r-proof" class="form-control form-control-sm mono" placeholder='{"pi_a":[...],...}'>
        </div>
        <div class="col-md-4">
          <label>publicSignalsJson</label>
          <input id="r-signals" class="form-control form-control-sm mono" placeholder='["1","743..."]'>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary btn-sm" onclick="receivePrescription()">Receive Prescription</button>
      </div>
      <div id="r-msg" class="mt-2"></div>
    </div>
  </div>

  <!-- QUEUE -->
  <div class="card-section">
    <div class="cs-header d-flex justify-content-between align-items-center">
      Dispensing Queue
      <button class="btn btn-outline-secondary btn-sm" onclick="loadPrescriptions()">Refresh</button>
    </div>
    <div class="cs-body p-0">
      <table class="table table-hover table-sm mb-0">
        <thead class="table-light">
          <tr><th>Received</th><th>Drug</th><th>Dosage</th><th>Patient</th><th>ZKP</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="rx-list"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '';
const DRUGS = {101:'Ibuprofen',102:'Aspirin',103:'Penicillin',104:'Paracetamol'};

async function get(path){const r=await fetch(API+path);return r.json();}
async function post(path,body=null){
  const opts={method:'POST',headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  if(!r.ok){const t=await r.text();throw new Error(t);}
  return r.json();
}
function msg(id,html,type='success'){document.getElementById(id).innerHTML=`<div class="alert alert-${type} p-2 small mb-0">${html}</div>`;}

async function receivePrescription(){
  try{
    const drugId = parseInt(document.getElementById('r-drug').value);
    const rx = await post('/api/prescriptions/receive',{
      drugId,
      drugName: DRUGS[drugId]||'Unknown',
      dosage: document.getElementById('r-dosage').value,
      patientId: document.getElementById('r-pid').value,
      stmtHash: document.getElementById('r-stmt').value||'',
      proofJson: document.getElementById('r-proof').value||'{}',
      publicSignalsJson: document.getElementById('r-signals').value||'[]',
      outcome: document.getElementById('r-outcome').value==='true',
    });
    msg('r-msg',`Prescription received — ID: <code>${rx.id}</code>`);
    loadPrescriptions();
  }catch(e){msg('r-msg',e.message,'danger');}
}

async function verifyRx(id){
  try{
    const res = await post(`/api/prescriptions/${id}/verify`);
    const ok = res.verified;
    showToast(ok ? '✓ ZKP proof verified successfully' : '✗ ZKP verification failed', ok?'success':'danger');
    loadPrescriptions();
  }catch(e){showToast(e.message,'danger');}
}

async function dispenseRx(id){
  try{
    await post(`/api/prescriptions/${id}/dispense`);
    showToast('Prescription dispensed ✓');
    loadPrescriptions();
  }catch(e){showToast(e.message,'danger');}
}

async function loadPrescriptions(){
  const rows = await get('/api/prescriptions');
  const tb = document.getElementById('rx-list');
  if(!rows.length){tb.innerHTML='<tr><td colspan="7" class="text-center text-muted py-3">No prescriptions received yet</td></tr>';return;}
  tb.innerHTML = rows.map(r=>{
    const canVerify  = r.status==='Received';
    const canDispense = r.status==='Verified';
    const zkp = r.outcome===true
      ? '<span class="zkp-pass">✓ PASS</span>'
      : r.outcome===false
        ? '<span class="zkp-fail">✗ FAIL</span>'
        : '<span class="text-muted">—</span>';
    return `<tr>
      <td>${new Date(r.receivedAt).toLocaleString()}</td>
      <td>${r.drugName||DRUGS[r.drugId]||r.drugId}</td>
      <td>${r.dosage}</td>
      <td class="mono" title="${r.patientId}">${r.patientId?.slice(0,8)}…</td>
      <td>${zkp}</td>
      <td><span class="status-${r.status}">${r.status}</span></td>
      <td>
        ${canVerify  ? `<button class="btn btn-warning btn-sm me-1" onclick="verifyRx('${r.id}')">Verify ZKP</button>` : ''}
        ${canDispense ? `<button class="btn btn-success btn-sm" onclick="dispenseRx('${r.id}')">Dispense</button>` : ''}
        ${r.status==='Dispensed'?'<span class="text-success">✓ Dispensed</span>':''}
        ${r.status==='Rejected'?'<span class="text-danger">✗ Rejected</span>':''}
      </td>
    </tr>`;
  }).join('');
}

function showToast(text, type='success'){
  const t=document.createElement('div');
  t.className=`alert alert-${type} position-fixed bottom-0 end-0 m-3`;
  t.style='z-index:9999;min-width:260px';
  t.textContent=text;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

loadPrescriptions();
</script>
</body>
</html>
